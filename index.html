<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>PYS AI SCANNER</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; padding: 20px; }
        .box { border: 2px solid #0f0; border-radius: 15px; padding: 20px; margin-top: 30px; }
        .scanner { width: 100px; height: 100px; border: 1px solid #0f0; margin: 20px auto; position: relative; }
        .line { position: absolute; width: 100%; height: 2px; background: #0f0; top: 0; display: none; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        #res { font-size: 1.2rem; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="box">
        <h3>AI POLYGRAPH v3.1</h3>
        <p>Maintenez le doigt pour analyser</p>
        <div class="scanner" onmousedown="go()" ontouchstart="go()">
            <div class="line" id="l"></div>
            <span style="font-size: 40px;">🔘</span>
        </div>
        <div id="res"></div>
    </div>

    <script type='text/javascript' src='//effectivegatecpm.com/0a/2c/b7/0a2cb754259ef0616833a7369fc84e29.js'></script>

    <script>
        function go() {
            let l = document.getElementById('l');
            let r = document.getElementById('res');
            l.style.display = 'block';
            l.style.animation = 'scan 2s infinite';
            r.innerHTML = "ANALYSE EN COURS...";
            
            setTimeout(() => {
                l.style.display = 'none';
                let test = Math.random() > 0.5;
                r.innerHTML = test ? "❌ MENSONGE !" : "✅ VÉRITÉ !";
                r.style.color = test ? "red" : "lime";
            }, 4000);
        }
    </script>
</body>
</html>
